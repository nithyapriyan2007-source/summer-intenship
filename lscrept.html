<style>
.search-box{
    text-align:center;
    margin:30px;
}
.search-box input{
    width:300px;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
}
.course-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:30px;
}
.card{
    width:250px;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
    padding:20px;
    text-align:center;
}
.card img{
    width:100%;
    border-radius:10px;
}
.card button{
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}
.card button:hover{
    background:#1d4ed8;
}
</style>

</head>
