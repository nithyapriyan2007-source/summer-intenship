<!DOCTYPE html>
<html>
<head>
    <title>Landing Page</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        /* Navbar */
        nav{
            background:#333;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 30px;
        }

        nav ul{
            list-style:none;
            display:flex;
        }

        nav ul li{
            margin-left:20px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
        }

        nav ul li a:hover{
            color:yellow;
        }

        /* Hero Section */
        .hero{
            height:400px;
            background:lightblue;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .hero button{
            padding:10px 20px;
            margin-top:15px;
            border:none;
            background:blue;
            color:white;
            cursor:pointer;
        }

        .hero button:hover{
            background:darkblue;
        }

        /* Features */
        .features{
            display:flex;
            justify-content:center;
            gap:20px;
            padding:40px;
        }

        .card{
            background:#f4f4f4;
            padding:20px;
            width:200px;
            text-align:center;
            border-radius:10px;
        }

        .card:hover{
            transform:scale(1.05);
        }

        /* Footer */
        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
        }

        /* Combinator Example */
        .features > .card h3{
            color:blue;
        }

        /* Advanced Selector */
        .card:first-child{
            border:2px solid blue;
        }

        /* Media Query */
        @media(max-width:768px){
            .features{
                flex-direction:column;
                align-items:center;
            }

            nav{
                flex-direction:column;
            }

            nav ul{
                margin-top:10px;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h2>MySite</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to Our Website</h1>
        <p>Create Amazing Experiences</p>
        <button>Get Started</button>
    </section>

    <!-- Features -->
    <section class="features">
        <div class="card">
            <h3>Feature 1</h3>
            <p>Fast and Easy</p>
        </div>

        <div class="card">
            <h3>Feature 2</h3>
            <p>Responsive Design</p>
        </div>

        <div class="card">
            <h3>Feature 3</h3>
            <p>User Friendly</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Landing Page</p>
    </footer>

</body>
</html>
